<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Colony Git</title>
<link rel="stylesheet" href="style.css?v=7">
</head>
<body>

<header id="topbar">
    <div class="topbar-inner">
        <a class="brand" href="#/">
            <svg class="brand-logo" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="6"  cy="5"  r="2.6" fill="currentColor"/>
                <circle cx="6"  cy="12" r="2.6" fill="currentColor"/>
                <circle cx="6"  cy="19" r="2.6" fill="currentColor"/>
                <circle cx="18" cy="9"  r="2.6" fill="currentColor"/>
                <line x1="6" y1="5"  x2="6"  y2="19" stroke="currentColor" stroke-width="1.6"/>
                <line x1="6" y1="9"  x2="18" y2="9"  stroke="currentColor" stroke-width="1.6"/>
            </svg>
            <span class="brand-name">COLONY GIT</span>
        </a>
        <nav class="crumbs" id="crumbs"></nav>
        <div class="grow"></div>
        <div class="searchbox">
            <input id="search-input" type="search" placeholder="Search repos..." autocomplete="off">
        </div>
        <a id="new-repo-link" class="topbar-icon hidden" href="new.html" title="New repository" aria-label="New repository">+</a>
        <div id="whoami-menu" class="user-menu hidden">
            <button id="whoami-trigger" class="user-menu-avatar" type="button" aria-haspopup="menu" aria-expanded="false">
                <span id="whoami-initials" class="user-menu-initials">?</span>
            </button>
            <div id="whoami-dropdown" class="user-menu-panel hidden" role="menu">
                <div class="user-menu-header">
                    <div class="user-menu-avatar user-menu-avatar--large" aria-hidden="true">
                        <span id="whoami-initials-large" class="user-menu-initials">?</span>
                    </div>
                    <div class="user-menu-id">
                        <div id="whoami-username" class="user-menu-username"></div>
                        <div class="user-menu-tagline">Signed in to Colony Git</div>
                    </div>
                </div>
                <div class="user-menu-divider"></div>
                <div class="user-menu-section">
                    <a id="profile-link" class="user-menu-item" role="menuitem" href="#/">
                        <span class="user-menu-glyph">@</span>
                        Profile
                    </a>
                    <a id="your-repos-link" class="user-menu-item" role="menuitem" href="#/">
                        <span class="user-menu-glyph">#</span>
                        Your repositories
                    </a>
                    <a class="user-menu-item" role="menuitem" href="tokens.html">
                        <span class="user-menu-glyph">$</span>
                        Access tokens
                    </a>
                </div>
                <div class="user-menu-divider"></div>
                <div class="user-menu-section">
                    <button id="signout-btn" class="user-menu-item user-menu-item--action" type="button" role="menuitem">
                        <span class="user-menu-glyph">⊳</span>
                        Sign out
                    </button>
                </div>
            </div>
        </div>
        <a id="signin-link" class="topbar-cta topbar-cta--ghost" href="login.html">Sign in</a>
        <a class="topbar-cta" href="signup.html">Sign up</a>
    </div>
</header>

<main id="app">
    <div class="loading">Loading...</div>
</main>

<!-- Overlay container for modals (Go-to-file) and floating dropdowns. -->
<div id="overlay" class="overlay hidden"></div>
<div id="popover" class="popover hidden"></div>

<footer id="footer">
    <span>Colony NAS - Git</span>
    <span class="dot">&middot;</span>
    <a href="/git/gitweb.cgi" target="_blank">gitweb (legacy)</a>
    <span class="dot">&middot;</span>
    <a href="https://github.com/MotherSphere/dns345-colony-edition" target="_blank">source</a>
</footer>

<script src="vendor/highlight.min.js"></script>
<script src="app.js?v=3"></script>
<script>
// Topbar auth: real cookie session via /login.cgi + /logout.cgi.
// On page load we probe /whoami.cgi - if it returns {user: <name>} we hide
// the Sign in / Sign up buttons and show a "Hi, <name>" dropdown with a
// Sign out item. Logout posts to /logout.cgi which clears the cookie.
(function () {
    var menu          = document.getElementById('whoami-menu');
    var trigger       = document.getElementById('whoami-trigger');
    var dropdown      = document.getElementById('whoami-dropdown');
    var initialsSmall = document.getElementById('whoami-initials');
    var initialsLarge = document.getElementById('whoami-initials-large');
    var usernameNode  = document.getElementById('whoami-username');
    var signOut       = document.getElementById('signout-btn');
    var signIn        = document.getElementById('signin-link');
    if (!menu || !trigger || !dropdown || !signOut || !signIn) return;

    function initialsFor(name) {
        // Take the first letter of each "word" chunk in the username,
        // up to 2 chars. underscore/hyphen split. Falls back to the first
        // two characters for plain alphanumeric names.
        var parts = name.split(/[-_\s]+/).filter(Boolean);
        var chars = parts.length > 1
            ? parts[0][0] + parts[1][0]
            : name.slice(0, 2);
        return chars.toUpperCase();
    }

    var newRepoLink = document.getElementById('new-repo-link');

    function setLoggedIn(name) {
        var inits = initialsFor(name);
        initialsSmall.textContent = inits;
        initialsLarge.textContent = inits;
        usernameNode.textContent = name;
        menu.classList.remove('hidden');
        signIn.classList.add('hidden');
        if (newRepoLink) newRepoLink.classList.remove('hidden');
        var profileLink = document.getElementById('profile-link');
        var yourReposLink = document.getElementById('your-repos-link');
        if (profileLink)  profileLink.href  = '#/u/' + encodeURIComponent(name);
        if (yourReposLink) yourReposLink.href = '#/u/' + encodeURIComponent(name);
        // Publish the current user globally so app.js (which loads as a
        // separate <script>) can hide/show owner-only UI like Settings tab.
        window.__COLONY_USER__ = name;
        window.dispatchEvent(new CustomEvent('colony-user-change', { detail: { user: name } }));
    }

    function setLoggedOut() {
        menu.classList.add('hidden');
        dropdown.classList.add('hidden');
        trigger.setAttribute('aria-expanded', 'false');
        signIn.classList.remove('hidden');
        if (newRepoLink) newRepoLink.classList.add('hidden');
        window.__COLONY_USER__ = null;
        window.dispatchEvent(new CustomEvent('colony-user-change', { detail: { user: null } }));
    }

    fetch('/colony-git/whoami.cgi', {
        credentials: 'include',
        cache: 'no-store'
    })
    .then(function (r) { return r.ok ? r.json() : { user: null }; })
    .then(function (j) {
        if (j && j.user) setLoggedIn(j.user); else setLoggedOut();
    })
    .catch(function () { setLoggedOut(); });

    trigger.addEventListener('click', function (ev) {
        ev.stopPropagation();
        var isOpen = !dropdown.classList.contains('hidden');
        dropdown.classList.toggle('hidden');
        trigger.setAttribute('aria-expanded', isOpen ? 'false' : 'true');
    });

    document.addEventListener('click', function (ev) {
        if (!menu.contains(ev.target)) {
            dropdown.classList.add('hidden');
            trigger.setAttribute('aria-expanded', 'false');
        }
    });

    document.addEventListener('keydown', function (ev) {
        if (ev.key === 'Escape') {
            dropdown.classList.add('hidden');
            trigger.setAttribute('aria-expanded', 'false');
        }
    });

    signOut.addEventListener('click', function () {
        fetch('/colony-git/logout.cgi', {
            method: 'POST',
            credentials: 'include',
            cache: 'no-store'
        }).then(function () {
            setLoggedOut();
        });
    });
})();
</script>
</body>
</html>
