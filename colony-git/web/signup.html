<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Colony Git - Create account</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Page-local styling layered on top of the SPA tokens in style.css. */
  .auth-shell {
      max-width: 460px;
      margin: 48px auto 0;
      padding: 0 24px;
  }
  .auth-card {
      background: var(--bg-soft);
      border: 1px solid var(--ink-faint);
      border-radius: var(--radius);
      box-shadow: var(--shadow-card);
      padding: 28px 32px;
  }
  .auth-card h1 {
      margin: 0 0 4px;
      font-size: 20px;
      color: var(--red);
      letter-spacing: 0.5px;
      text-transform: uppercase;
  }
  .auth-card .subtitle {
      margin: 0 0 22px;
      color: var(--ink-faint);
      font-size: 12px;
  }
  .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 14px;
  }
  .field label {
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--ink-dim);
  }
  .field input {
      background: var(--bg);
      border: 1px solid var(--ink-dim);
      border-radius: var(--radius-sm);
      color: var(--ink);
      font-family: inherit;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
  }
  .field input:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 2px var(--red-faint);
  }
  .field .hint {
      color: var(--ink-faint);
      font-size: 11px;
  }
  .auth-actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
      align-items: center;
  }
  .btn-primary {
      background: var(--red);
      color: var(--bg);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 8px 18px;
      text-transform: uppercase;
      transition: background 80ms ease;
  }
  .btn-primary:hover { background: var(--red-hover); }
  .btn-primary:disabled {
      background: var(--ink-faint);
      cursor: not-allowed;
  }
  .auth-msg {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      line-height: 1.5;
  }
  .auth-msg.error {
      background: var(--red-faint);
      border: 1px solid var(--red-soft);
      color: var(--red-pressed);
  }
  .auth-msg.success {
      background: var(--bg-deeper);
      border: 1px solid var(--ink-faint);
      color: var(--ink);
  }
  .auth-msg pre {
      background: var(--bg);
      border: 1px solid var(--ink-faint);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      margin: 6px 0 0;
      overflow-x: auto;
      font-size: 11.5px;
  }
  .auth-foot {
      margin-top: 18px;
      font-size: 11px;
      color: var(--ink-faint);
      text-align: center;
  }
  .auth-foot a { color: var(--red); }
</style>
</head>
<body>

<header id="topbar">
    <div class="topbar-inner">
        <a class="brand" href="/colony-git/">
            <svg class="brand-logo" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="6"  cy="5"  r="2.6" fill="currentColor"/>
                <circle cx="6"  cy="12" r="2.6" fill="currentColor"/>
                <circle cx="6"  cy="19" r="2.6" fill="currentColor"/>
                <circle cx="18" cy="9"  r="2.6" fill="currentColor"/>
                <line x1="6" y1="5"  x2="6"  y2="19" stroke="currentColor" stroke-width="1.6"/>
                <line x1="6" y1="9"  x2="18" y2="9"  stroke="currentColor" stroke-width="1.6"/>
            </svg>
            <span class="brand-name">COLONY GIT</span>
        </a>
        <div class="grow"></div>
    </div>
</header>

<main class="auth-shell">
    <div class="auth-card">
        <h1>Create your account</h1>
        <p class="subtitle">Self-service signup for LAN clients. Used for <code>git clone</code> over HTTP.</p>

        <form id="signup-form" autocomplete="off">
            <div class="field">
                <label for="f-username">Username</label>
                <input id="f-username" name="username" type="text" autocomplete="off"
                       minlength="3" maxlength="20" required
                       pattern="[A-Za-z0-9][A-Za-z0-9_-]{2,19}">
                <span class="hint">3 to 20 characters. Letters, digits, _ and - only.</span>
            </div>

            <div class="field">
                <label for="f-password">Password</label>
                <input id="f-password" name="password" type="password" autocomplete="new-password"
                       minlength="5" maxlength="64" required>
                <span class="hint">5 to 64 characters. No colon.</span>
            </div>

            <div class="field">
                <label for="f-password2">Confirm password</label>
                <input id="f-password2" name="password2" type="password" autocomplete="new-password"
                       minlength="5" maxlength="64" required>
            </div>

            <div class="auth-actions">
                <button id="submit-btn" class="btn-primary" type="submit">Create account</button>
            </div>
        </form>

        <div id="msg" class="auth-msg" hidden></div>
    </div>

    <p class="auth-foot">
        Already have an account? Use it directly in your <code>git clone</code> URL.<br>
        <a href="/colony-git/">Back to repositories</a>
    </p>
</main>

<script>
(function () {
    var form = document.getElementById('signup-form');
    var msg  = document.getElementById('msg');
    var btn  = document.getElementById('submit-btn');

    function show(kind, html) {
        msg.className = 'auth-msg ' + kind;
        msg.innerHTML = html;
        msg.hidden = false;
    }

    function encodeForm(data) {
        var parts = [];
        for (var k in data) {
            parts.push(encodeURIComponent(k) + '=' + encodeURIComponent(data[k]));
        }
        return parts.join('&');
    }

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
    }

    form.addEventListener('submit', function (ev) {
        ev.preventDefault();
        var u  = form.username.value.trim();
        var p1 = form.password.value;
        var p2 = form.password2.value;

        if (p1 !== p2) {
            show('error', 'Passwords do not match.');
            return;
        }

        btn.disabled = true;
        msg.hidden = true;

        fetch('/colony-git/signup.cgi', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: encodeForm({ username: u, password: p1, password2: p2 })
        })
        .then(function (r) { return r.json().then(function (j) { return { status: r.status, body: j }; }); })
        .then(function (res) {
            if (res.body && res.body.ok) {
                var safeUser = escapeHtml(res.body.user);
                show('success',
                    'Account <strong>' + safeUser + '</strong> created.<br><br>' +
                    'Clone a repository with:' +
                    '<pre>git clone http://' + safeUser + ':PASSWORD@' + location.host + '/colony-git/repos/REPO.git</pre>'
                );
                form.reset();
            } else {
                var err = (res.body && res.body.error) ? res.body.error : 'unknown error';
                show('error', escapeHtml(err));
            }
        })
        .catch(function (e) {
            show('error', 'Network error: ' + escapeHtml(String(e)));
        })
        .then(function () { btn.disabled = false; });
    });
})();
</script>

</body>
</html>
