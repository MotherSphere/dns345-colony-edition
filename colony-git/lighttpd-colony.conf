server.document-root = "/var/www/"

server.port = 80
#server.username = "root"
#server.group = "root"

#server.max-worker = 1

server.max-fds = 8192

server.max-connections = 4096

server.max-keep-alive-idle = 4

server.modules   = ( "mod_rewrite",
                     "mod_alias",
                     "mod_access",
                     "mod_setenv",
                     "mod_cgi",
                     "mod_fastcgi",
                     "mod_status",
                     "mod_accesslog",
                     "mod_flv_streaming",
                     "mod_secdownload",
                     "mod_webdav",
                     "mod_compress",
                     "mod_auth",
                    #"mod_dirlisting"
                   )

setenv.add-response-header = ( "Content-Language" => "en" ,
				"P3P" => "CP='CURa ADMa DEVa PSAo PSDo OUR BUS UNI PUR INT DEM STA PRE COM NAV OTC NOI DSP COR'")

#dir-listing.activate = "enable"
#server.errorlog-use-syslog  = "enable"

include "/etc/lighttpd/mimetypes"

secdownload.secret = "SoyWXd8WXW16"
secdownload.document-root = "/mnt/"
secdownload.uri-prefix = "/sdownload/"
secdownload.timeout = 7200

$SERVER["socket"] == ":80" {

}

$SERVER["socket"] == "[::]:80" {
	server.use-ipv6 = "enable"
}

cgi.assign = (
    ".cgi" => "",
   #".php" => "/usr/bin/php-cgi"
             )

flv-streaming.extensions = ( ".flv" )

alias.url       += ( "/cgi-bin/" => "/var/www/cgi-bin/" )
alias.url       += ( "/xml/" => "/var/www/xml/" )

server.max-request-size = 4194303

fastcgi.server = ( ".php" => ( "localhost" => ("host" => "127.0.0.1","port" => "5555" , "bin-path" => "/usr/bin/php-cgi" , "bin-environment" => ( "PHP_FCGI_CHILDREN" => "2" ,"PHP_FCGI_MAX_REQUESTS" => "1000" ) , "max-procs" => "1" ) ) )

server.network-backend = "writev"

static-file.exclude-extensions = ( ".cgi" )

server.upload-dirs = ("/var/tmp/")


$SERVER["socket"] == "127.0.0.1:443" {
	ssl.engine = "enable"
	ssl.pemfile = "/etc/certificate_https_all.pem"
}

$SERVER["socket"] == "192.168.1.104:443" {
	ssl.engine = "enable"
	ssl.pemfile = "/etc/certificate_https_all.pem"
}

$SERVER["socket"] == "[::1]:443" {
	server.use-ipv6 = "enable"
	ssl.engine = "enable"
	ssl.pemfile = "/etc/certificate_https_all.pem"
}

$SERVER["socket"] == "[fe80::1e7e:e5ff:fed3:c99d%bond0]:443" {
	server.use-ipv6 = "enable"
	ssl.engine = "enable"
	ssl.pemfile = "/etc/certificate_https_all.pem"
}

# test

alias.url += ( "/git/" => "/ffp/share/gitweb/" )
$HTTP["url"] =~ "^/git/" {
    cgi.assign = ( ".cgi" => "/ffp/bin/perl" )
    setenv.add-environment = ( "GITWEB_CONFIG" => "/ffp/colony/gitweb-config.pm", "GIT_PROJECT_ROOT" => "/mnt/HD/HD_a2/git", "PATH" => "/ffp/bin:/usr/bin:/bin" )
}

url.rewrite-once = (
    "^/?$" => "/web/login.html",
    "^/index\.html$" => "/web/login.html",
    "^/colony-git/?$" => "/colony-git/index.html"
)

# Colony Git - aliases (specific BEFORE broad: lighttpd alias matching is
# first-declared-wins, so /colony-git/api/, /colony-git/signup.cgi, and
# /colony-git/repos must appear before the /colony-git/ catch-all).
alias.url += ( "/colony-git/api/"      => "/ffp/colony/colony-git/cgi-bin/" )
alias.url += ( "/colony-git/signup.cgi" => "/ffp/colony/colony-git/cgi-bin/signup.cgi" )
alias.url += ( "/colony-git/repos"     => "/ffp/colony/colony-git/cgi-bin/git-http.cgi" )
alias.url += ( "/colony-git/"          => "/ffp/colony/colony-git/web/" )

$HTTP["url"] =~ "^/colony-git/api/" {
    cgi.assign = ( ".cgi" => "/ffp/bin/bash" )
    setenv.add-environment = (
        "PATH" => "/ffp/bin:/usr/bin:/bin",
        "COLONY_GIT_REPOS_ROOT" => "/mnt/HD/HD_a2/git",
        "COLONY_GIT_BIN" => "/ffp/bin/git"
    )
}

# Self-service signup. Open (LAN-only enforced in the CGI script).
$HTTP["url"] =~ "^/colony-git/signup\.cgi$" {
    cgi.assign = ( ".cgi" => "/ffp/bin/bash" )
    setenv.add-environment = (
        "PATH" => "/ffp/bin:/usr/bin:/bin",
        "COLONY_GIT_HTPASSWD" => "/mnt/HD/HD_a2/ffp/etc/colony-git.htpasswd"
    )
}

# Clone/push over HTTP. The git-http.cgi wrapper performs basic auth in-shell
# (lighttpd 1.4.28's mod_auth on this D-Link build silently rejects every
# stored hash format -- $apr1$, $1$, DES, {SHA}, plaintext -- despite crypt(3)
# itself working fine, so auth has been moved into the CGI itself) and
# exec()s git-http-backend on success.
$HTTP["url"] =~ "^/colony-git/repos/" {
    cgi.assign = ( "" => "/ffp/bin/bash" )
    setenv.add-environment = (
        "PATH" => "/ffp/bin:/usr/bin:/bin",
        "GIT_PROJECT_ROOT" => "/mnt/HD/HD_a2/git",
        "GIT_HTTP_EXPORT_ALL" => "1",
        "COLONY_GIT_HTPASSWD" => "/mnt/HD/HD_a2/ffp/etc/colony-git.htpasswd"
    )
}
